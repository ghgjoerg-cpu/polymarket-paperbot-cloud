name: Polymarket Paper Bot Cloud

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

concurrency:
  group: polymarket-paperbot-cloud
  cancel-in-progress: true

jobs:
  run-paperbot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper bot
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python cloud_paperbot.py

      - name: Commit updated dashboard and portfolio
        run: |
          git config user.name "paperbot-actions"
          git config user.email "paperbot-actions@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No dashboard changes to commit" || git commit -m "Update paper bot dashboard and portfolio"
          git push
